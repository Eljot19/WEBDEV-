<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberLogin</title>
<link rel="stylesheet" href="Aljohn.css">
</head>

<body>

<div class="container">

<!-- LOGIN FORM -->
<div class="form-box" id="login">

<h2>RMMC-MI</h2>


<input type="text" placeholder="Enter your username">

<input type="password" placeholder="Enter your password">

<label class="remember">
<input type="checkbox"> Remember me
</label>

<button class="btn">Log In</button>

<p class="switch">Don't have an account? <a href="#" onclick="showRegister()">Create Account Here</a></p>

</div>


<!-- REGISTER FORM -->
<div class="form-box hidden" id="register">

<h2>SIGN UP FORM</h2>
<p>Register your account to get started</p>

<input type="text" placeholder="First Name">
<input type="text" placeholder="Middle Name">
<input type="text" placeholder="Last Name">

<input type="date">

<input type="Number" placeholder="Age">

<input type="text" placeholder="Address">
<input type="text" placeholder="Username">

<input type="password" placeholder="Enter password">
<input type="password" placeholder="Confirm password">

<label class="remember">
<input type="checkbox"> I agree to the terms
</label>

<button class="btn">Create Account</button>

<p class="switch">Already have an account? <a href="#" onclick="showLogin()">Sign In</a></p>

</div>

</div>


<script>

function showRegister(){
document.getElementById("login").classList.add("hidden");
document.getElementById("register").classList.remove("hidden");
}

function showLogin(){
document.getElementById("register").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");
}

</script>

</body>
</html>
